build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

style:
  MagicNumber:
    active: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    threshold: 6
  ComplexMethod:
    threshold: 15
  TooManyFunctions:
    threshold: 15

formatting:
  MaxLineLength:
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
